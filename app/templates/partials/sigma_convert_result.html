{% from "macros/icons.html" import icon, icon_text %}
<!-- Sigma Convert Result Partial -->

{% if success %}
<div class="alert alert-success mb-sm" style="display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap;">
    <div>
        <strong>Conversion ready.</strong>
        Rule modal opens with prefilled values.
    </div>
    {% if prefill_payload %}
    <button type="button"
            class="btn btn-primary btn-sm"
            hx-get="/api/rules/create-form?prefill={{ prefill_payload }}"
            hx-target="#modal-container"
            hx-swap="innerHTML">
        {{ icon_text('plus-circle', 'Open Rule Modal', '14') }}
    </button>
    {% endif %}
</div>

<!-- Store raw query for deployment (original NDJSON) -->
<input type="hidden" id="raw-query-store" value="{{ raw_query | e }}">

<script>
// Auto-open the shared rule modal with the converted Sigma payload.
(function() {
    const prefill = {{ prefill_payload | default('') | tojson }};
    if (prefill && window.htmx) {
        window.setTimeout(function() {
            htmx.ajax('GET', '/api/rules/create-form?prefill=' + prefill, {
                target: '#modal-container',
                swap: 'innerHTML'
            });
        }, 0);
    }
})();

function downloadQuery() {
    const original = document.getElementById('raw-query-store')?.value || '';
    const blob = new Blob([original], { type: 'text/plain' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'sigma_query.ndjson';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
}

// Expose globally
window.downloadQuery = downloadQuery;
</script>

{% else %}
<div class="alert alert-danger mb-sm">
    <strong>Conversion Error:</strong><br>
    {{ result }}
</div>
{% endif %}
