<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TIDE{% endblock %}</title>
    
    <!-- TIDE Semantic CSS -->
    <link rel="stylesheet" href="/static/css/style.css?v={{ cache_bust | default(range(1, 99999) | random) }}">
    
    <!-- HTMX Core + Head Support Extension (bundled locally for air-gapped/standalone) -->
    <script defer src="/static/js/htmx.min.js?v={{ cache_bust | default('0') }}"></script>
    <script defer src="/static/js/vendor/head-support.min.js?v={{ cache_bust | default('0') }}"></script>
    
    <!-- TIDE Application JavaScript -->
    <script defer src="/static/js/app.js?v={{ cache_bust | default(range(1, 99999) | random) }}"></script>
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/static/icons/tide 48x48.png">
    
    {% block head %}{% endblock %}
</head>
<body hx-boost="true" hx-ext="head-support">
    <!-- App Layout Container -->
    <div class="app-layout{% if not user %} no-sidebar{% endif %}">
        <!-- Sidebar -->
        {% if user %}
        {% include "components/sidebar.html" %}
        {% endif %}
        
        <!-- Main Content Area -->
        <main class="main-content">
            {% block content %}{% endblock %}
        </main>
    </div>
    
    <!-- Toast Container -->
    <div id="toast-container" class="toast-container"></div>

    <!-- Global Modal Container (for rule detail modals triggered from MITRE pills etc.) -->
    <div id="modal-container"></div>

    <!-- HTMX global error handler (stale-page / network errors) -->
    <script>
    document.addEventListener('DOMContentLoaded', function() {
        // Network-level failure (connection lost, timeout)
        document.body.addEventListener('htmx:sendError', function() {
            if (typeof showToast === 'function') {
                showToast('Connection lost — please refresh the page.', 'error');
            } else {
                window.location.reload();
            }
        });
        // Server returned non-2xx (e.g. 401 slipped through without HX-Redirect)
        document.body.addEventListener('htmx:responseError', function(evt) {
            var status = evt.detail.xhr ? evt.detail.xhr.status : 0;
            if (status === 401 || status === 403) {
                window.location.href = '/login';
            } else if (typeof showToast === 'function') {
                showToast('Request failed (HTTP ' + status + '). Try refreshing.', 'error');
            }
        });
    });
    </script>
    
    {% block scripts %}{% endblock %}
</body>
</html>
